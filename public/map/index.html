        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            if (tempDiv.querySelector('td img')) {
                popup._contentNode.classList.add('media');
                // Delay to force the redraw
                setTimeout(function () {
                    popup.update();
                }, 10);
            } else {
                popup._contentNode.classList.remove('media');
            }

            // === OTHER WAYPOINTS ===
            'wp_A': { lat: 47.028142, lng: 21.898729, label: 'Hol principal' },
            'wp_B': { lat: 47.028782, lng: 21.898859, label: 'Coridor superior' },
            'wp_C': { lat: 47.028744, lng: 21.899096, label: 'Intersecție est' },
            'wp_D': { lat: 47.028295, lng: 21.898992, label: 'Zona gates' },

            // === BRANCH WAYPOINTS (derived from main corridor) ===
            // South branch from wp_D down through gates corridor
            'wp_gates_south': { lat: 47.027900, lng: 21.898970 },  // mid-south gate corridor
            'wp_gates_bottom': { lat: 47.027650, lng: 21.898950 },  // bottom of gate corridor
        };

        // EDGES: main corridor spine + branches to POIs
        var corridorEdges = [
            // === PATH: Security -> Disabled restroom 2 ===
            ['security', 'wp_SD1'],
            ['wp_SD1', 'wp_SD2'],
            ['wp_SD2', 'wp_SD3'],
            ['wp_SD3', 'wp_SD4'],
            ['wp_SD4', 'wp_SD5'],
            ['wp_SD5', 'wp_SD6'],
            ['wp_SD6', 'wp_SD7'],
            ['wp_SD7', 'wp_SD8'],
            ['wp_SD8', 'wp_SD9'],
            ['wp_SD9', 'wp_SD10'],
            ['wp_SD10', 'wc_disabled2'],

            // === MAIN CORRIDOR SPINE ===
            ['entrance', 'wp_A'],
            ['wp_A', 'wp_B'],
            ['wp_B', 'wp_C'],
            ['wp_C', 'wp_D'],

            // === GATE CORRIDOR (south from wp_D) ===
            ['wp_D', 'wp_gates_south'],
            ['wp_gates_south', 'wp_gates_bottom'],

            // === POIs branching off wp_A (entrance hall area) ===
            ['wp_A', 'checkin'],          // check-in is near entrance
            ['wp_A', 'security'],         // security is near entrance hall
            ['wp_A', 'parking2'],         // parking2 is west of entrance

            // === POIs branching off wp_B (upper corridor, near exit) ===
            ['wp_B', 'exit'],             // exit is near wp_B
            ['wp_B', 'parking1'],         // parking1 is north
            ['wp_B', 'medical'],          // pharmacy near exit

            // === POIs branching off wp_C (east turn) ===
            ['wp_C', 'shop'],             // shop is east-upper
            ['wp_C', 'wc_men2'],
            ['wp_C', 'wc_women2'],

            // === POIs branching off wp_D (gates junction) ===
            ['wp_D', 'elevator'],         // elevator near gates junction
            ['wp_D', 'kids'],             // kids area near gates
            ['wp_D', 'gate6'],            // gate 6 is nearest to wp_D
            ['wp_D', 'gate5'],            // gate 5
            ['wp_D', 'gate4'],            // gate 4
            ['wp_D', 'waiting1'],         // waiting room 1

            // === POIs branching off wp_gates_south (mid gates) ===
            ['wp_gates_south', 'gate3'],
            ['wp_gates_south', 'gate2'],
            ['wp_gates_south', 'waiting2'],
            ['wp_gates_south', 'restaurant'],

            // === POIs branching off wp_gates_bottom (bottom gates) ===
            ['wp_gates_bottom', 'gate1'],
            ['wp_gates_bottom', 'cafe'],
            ['wp_gates_bottom', 'wc_disabled'],
            ['wp_gates_bottom', 'wc_men'],
            ['wp_gates_bottom', 'wc_women'],
        ];

        // Build adjacency list
        var adjList = {};
        Object.keys(allNodes).forEach(function (id) { adjList[id] = []; });
        corridorEdges.forEach(function (e) {
            var a = allNodes[e[0]], b = allNodes[e[1]];
            var d = Math.sqrt(Math.pow(a.lat - b.lat, 2) + Math.pow(a.lng - b.lng, 2));
            adjList[e[0]].push({ node: e[1], weight: d });
            adjList[e[1]].push({ node: e[0], weight: d });
        });

        // Dijkstra
        function findCorridorPath(startId, endId) {
            var dist = {}, prev = {}, unvisited = new Set();
            Object.keys(allNodes).forEach(function (id) {
                dist[id] = Infinity; prev[id] = null; unvisited.add(id);
            });
            dist[startId] = 0;
            while (unvisited.size > 0) {
                var cur = null, minD = Infinity;
                unvisited.forEach(function (n) { if (dist[n] < minD) { minD = dist[n]; cur = n; } });
                if (!cur || cur === endId) break;
                unvisited.delete(cur);
                (adjList[cur] || []).forEach(function (nb) {
                    var alt = dist[cur] + nb.weight;
                    if (alt < dist[nb.node]) { dist[nb.node] = alt; prev[nb.node] = cur; }
                });
            }
            var path = []; var c = endId;
            while (c) { path.unshift(c); c = prev[c]; }
            return path[0] === startId ? path : [];
        }

        // Find closest node ID to coordinates
        function findNearestNodeId(lat, lng) {
            var best = null, bestDist = Infinity;
            Object.keys(allNodes).forEach(function (id) {
                var n = allNodes[id];
                var d = Math.sqrt(Math.pow(n.lat - lat, 2) + Math.pow(n.lng - lng, 2));
                if (d < bestDist) { bestDist = d; best = id; }
            });
            return best;
        }

        function clearRoute() {
            if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
            if (routeGlowLayer) { map.removeLayer(routeGlowLayer); routeGlowLayer = null; }
            if (currentStepMarker) { map.removeLayer(currentStepMarker); currentStepMarker = null; }
            routeMarkers.forEach(function (m) { map.removeLayer(m); });
            routeMarkers = [];
            currentRouteCoords = [];
            if (dashAnimInterval) { clearInterval(dashAnimInterval); dashAnimInterval = null; }
        }

        function drawRoute(originId, destId, originLabel, destLabel) {
            clearRoute();

            var pathIds = findCorridorPath(originId, destId);
            if (pathIds.length === 0) return;

            // Build coordinates (only visible POI stops, skip waypoints for step display)
            currentRouteCoords = [];
            pathIds.forEach(function (id) {
                var n = allNodes[id];
                currentRouteCoords.push({ lat: n.lat, lng: n.lng, id: id, label: n.label || '' });
            });

            var latLngs = currentRouteCoords.map(function (c) { return [c.lat, c.lng]; });

            // Glow layer
            routeGlowLayer = L.polyline(latLngs, {
                color: '#0f62fe', weight: 10, opacity: 0.25,
                lineCap: 'round', lineJoin: 'round'
            }).addTo(map);

            // Main route
            routeLayer = L.polyline(latLngs, {
                color: '#4ecdc4', weight: 4, opacity: 0.9,
                dashArray: '12 8', lineCap: 'round', lineJoin: 'round'
            }).addTo(map);

            // Animate dash
            var offset = 0;
            dashAnimInterval = setInterval(function () {
                offset -= 1;
                if (routeLayer) routeLayer.setStyle({ dashOffset: offset });
            }, 50);

            // Start marker (green)
            var startIcon = L.divIcon({
                className: '',
                html: '<div style="width:22px;height:22px;background:#4CAF50;border:3px solid white;border-radius:50%;box-shadow:0 0 14px #4CAF50,0 2px 8px rgba(0,0,0,0.5);"></div>',
                iconSize: [22, 22], iconAnchor: [11, 11]
            });
            var sm = L.marker(latLngs[0], { icon: startIcon, zIndexOffset: 1000 }).addTo(map);
            sm.bindPopup('<b style="color:#4CAF50;">📍 Start: ' + originLabel + '</b>');
            routeMarkers.push(sm);

            // End marker (red)
            var endIcon = L.divIcon({
                className: '',
                html: '<div style="width:22px;height:22px;background:#e74c3c;border:3px solid white;border-radius:50%;box-shadow:0 0 14px #e74c3c,0 2px 8px rgba(0,0,0,0.5);"></div>',
                iconSize: [22, 22], iconAnchor: [11, 11]
            });
            var em = L.marker(latLngs[latLngs.length - 1], { icon: endIcon, zIndexOffset: 1000 }).addTo(map);
            em.bindPopup('<b style="color:#e74c3c;">🎯 Destinație: ' + destLabel + '</b>');
            routeMarkers.push(em);

            // Fit bounds
            map.fitBounds(L.latLngBounds(latLngs), { padding: [60, 60], maxZoom: 20 });

            // Send path info back to parent for step navigation
            var steps = [];
            var stepNum = 0;
            currentRouteCoords.forEach(function (c) {
                stepNum++;
                var lbl = c.label || ('Pas ' + stepNum);
                steps.push({ id: c.id, label: lbl, lat: c.lat, lng: c.lng });
            });
            window.parent.postMessage({ type: 'ROUTE_READY', steps: steps, totalCoords: currentRouteCoords.length }, '*');
        }

        function setCurrentStep(lat, lng, stepLabel) {
            if (currentStepMarker) { map.removeLayer(currentStepMarker); }

            var userIcon = L.divIcon({
                className: '',
                html: '<div style="width:28px;height:28px;background:#0f62fe;border:4px solid white;border-radius:50%;box-shadow:0 0 20px rgba(15,98,254,0.7),0 3px 10px rgba(0,0,0,0.5);animation:pulse 1.5s infinite;"></div>',
                iconSize: [28, 28], iconAnchor: [14, 14]
            });
            currentStepMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 2000 }).addTo(map);
            currentStepMarker.bindPopup('<b style="color:#0f62fe;">📍 ' + (stepLabel || 'Poziția ta') + '</b>').openPopup();

            map.setView([lat, lng], 20, { animate: true });
        }

        // Listen for messages from React parent
        window.addEventListener('message', function (event) {
            if (!event.data || !event.data.type) return;

            if (event.data.type === 'NAVIGATE') {
                var o = event.data.origin;
                var d = event.data.dest;
                if (o && d) {
                    drawRoute(o.id, d.id, o.label, d.label);
                }
            }

            if (event.data.type === 'SET_STEP') {
                setCurrentStep(event.data.lat, event.data.lng, event.data.label);
            }

            if (event.data.type === 'SWAP_DEST') {
                // Update last coordinate without full re-navigation
                var nd = event.data.newDest;
                if (nd && currentRouteCoords.length > 0) {
                    // Swap last coord
                    currentRouteCoords[currentRouteCoords.length - 1] = {
                        lat: nd.lat, lng: nd.lng, id: nd.id, label: nd.label
                    };

                    var latLngs = currentRouteCoords.map(function (c) { return [c.lat, c.lng]; });

                    // Redraw polylines
                    if (routeGlowLayer) routeGlowLayer.setLatLngs(latLngs);
                    if (routeLayer) routeLayer.setLatLngs(latLngs);

                    // Move end marker (last marker in routeMarkers)
                    if (routeMarkers.length >= 2) {
                        var endMarker = routeMarkers[routeMarkers.length - 1];
                        endMarker.setLatLng([nd.lat, nd.lng]);
                        endMarker.setPopupContent('<b style="color:#e74c3c;">🎯 Destinație: ' + nd.label + '</b>');
                    }
                }
            }

            if (event.data.type === 'CLEAR_ROUTE') {
                clearRoute();
                map.fitBounds([[47.027689, 21.897300], [47.029601, 21.899700]]);
            }

            if (event.data.type === 'ASSISTANT_ANIMATE') {
                startAssistantAnimation(event.data.origin, event.data.dest, event.data.durationMs || 120000);
            }

            if (event.data.type === 'ASSISTANT_CLEAR') {
                clearAssistant();
            }
        });

        // --- ASSISTANT DOT ANIMATION ---
        var assistantMarker = null;
        var assistantRouteLayer = null;
        var assistantGlowLayer = null;
        var assistantAnimFrame = null;

        function clearAssistant() {
            if (assistantMarker) { map.removeLayer(assistantMarker); assistantMarker = null; }
            if (assistantRouteLayer) { map.removeLayer(assistantRouteLayer); assistantRouteLayer = null; }
            if (assistantGlowLayer) { map.removeLayer(assistantGlowLayer); assistantGlowLayer = null; }
            if (assistantAnimFrame) { cancelAnimationFrame(assistantAnimFrame); assistantAnimFrame = null; }
        }

        function startAssistantAnimation(originId, destId, durationMs) {
            clearAssistant();

            var pathIds = findCorridorPath(originId, destId);
            if (pathIds.length === 0) return;

            var coords = pathIds.map(function (id) {
                var n = allNodes[id];
                return [n.lat, n.lng];
            });

            // Draw route line
            assistantGlowLayer = L.polyline(coords, {
                color: '#0f62fe', weight: 10, opacity: 0.2,
                lineCap: 'round', lineJoin: 'round'
            }).addTo(map);

            assistantRouteLayer = L.polyline(coords, {
                color: '#0f62fe', weight: 4, opacity: 0.7,
                dashArray: '8 6', lineCap: 'round', lineJoin: 'round'
            }).addTo(map);

            // Calculate segment distances for interpolation
            var segDists = [];
            var totalDist = 0;
            for (var i = 1; i < coords.length; i++) {
                var dx = coords[i][0] - coords[i - 1][0];
                var dy = coords[i][1] - coords[i - 1][1];
                var d = Math.sqrt(dx * dx + dy * dy);
                segDists.push(d);
                totalDist += d;
            }

            // Create assistant marker (blue dot)
            var assistIcon = L.divIcon({
                className: '',
                html: '<div style="width:24px;height:24px;background:#0f62fe;border:3px solid white;border-radius:50%;box-shadow:0 0 18px rgba(15,98,254,0.8),0 2px 8px rgba(0,0,0,0.5);animation:pulse 1.5s infinite;"></div>',
                iconSize: [24, 24], iconAnchor: [12, 12]
            });
            assistantMarker = L.marker(coords[0], { icon: assistIcon, zIndexOffset: 3000 }).addTo(map);
            assistantMarker.bindPopup('<b style="color:#0f62fe;">🔵 Assistant</b>');

            // Fit bounds to see the route
            map.fitBounds(L.latLngBounds(coords), { padding: [60, 60], maxZoom: 19 });

            // Animate over durationMs
            var startTime = performance.now();

            function animate(now) {
                var elapsed = now - startTime;
                var progress = Math.min(elapsed / durationMs, 1);

                // Find position along the path
                var targetDist = progress * totalDist;
                var accumulated = 0;
                var pos = coords[0];
                for (var j = 0; j < segDists.length; j++) {
                    if (accumulated + segDists[j] >= targetDist) {
                        var segProgress = (targetDist - accumulated) / segDists[j];
                        pos = [
                            coords[j][0] + (coords[j + 1][0] - coords[j][0]) * segProgress,
                            coords[j][1] + (coords[j + 1][1] - coords[j][1]) * segProgress
                        ];
                        break;
                    }
                    accumulated += segDists[j];
                    pos = coords[j + 1];
                }

                if (assistantMarker) {
                    assistantMarker.setLatLng(pos);
                }

                if (progress < 1) {
                    assistantAnimFrame = requestAnimationFrame(animate);
                }
            }

            assistantAnimFrame = requestAnimationFrame(animate);
        }

        // Pulse animation
        var pulseStyle = document.createElement('style');
        pulseStyle.textContent = '@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }';
        document.head.appendChild(pulseStyle);
    </script>
</body>
